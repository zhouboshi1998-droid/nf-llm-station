<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>多源观点聚合台</title>
<style>
:root{--bg:#f4f2ec;--paper:#fff;--ink:#2C2C2A;--muted:#5F5E5A;--hint:#8b8a83;
--line:#e6e3da;--line2:#eceae3;--coral:#D85A30;--coral-dk:#9C3A18;--coral-bg:#FBEBE4;
--green:#159068;--green-bg:#E2F4ED;--red:#c0392b;--red-bg:#fbe9e7;--blue:#1a56a0;--blue-bg:#E8F1FB;
--mono:"JetBrains Mono",ui-monospace,Consolas,monospace;--sans:-apple-system,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;}
*{box-sizing:border-box;} body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);font-size:14px;line-height:1.55;}
.wrap{max-width:1120px;margin:0 auto;padding:24px 20px 70px;}
header{border-bottom:2px solid var(--ink);padding-bottom:14px;}
.kick{font-family:var(--mono);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:var(--coral);margin:0 0 6px;}
h1{font-size:26px;font-weight:800;margin:0 0 7px;letter-spacing:-.01em;}
.meta{font-family:var(--mono);font-size:11.5px;color:var(--hint);}
/* filter bar */
.filters{position:sticky;top:0;z-index:9;background:var(--bg);padding:12px 0 10px;margin-top:6px;border-bottom:1px solid var(--line);}
.frow{display:flex;flex-wrap:wrap;align-items:center;gap:7px;margin-bottom:7px;}
.frow .lb{font-family:var(--mono);font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-right:3px;min-width:52px;}
.search{position:relative;flex:1;min-width:200px;}
.search input{width:100%;padding:7px 11px 7px 30px;border:1px solid var(--line);border-radius:8px;background:#fff;font-size:13px;font-family:var(--sans);outline:none;}
.search input:focus{border-color:var(--coral);}
.search svg{position:absolute;left:9px;top:8px;width:14px;height:14px;stroke:var(--hint);fill:none;}
.chip{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 11px;border-radius:16px;border:1px solid var(--line);background:#fff;color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;}
.chip:hover{border-color:var(--hint);}
.chip.on{color:#fff;border-color:transparent;}
.chip.dim{opacity:.4;}
/* section */
.sec{margin-top:26px;}
.sec-h{display:flex;align-items:baseline;gap:10px;border-bottom:1px solid var(--line);padding-bottom:6px;margin-bottom:13px;}
.sec-h .n{font-family:var(--mono);font-size:12px;color:var(--coral);font-weight:700;}
.sec-h h2{font-size:16.5px;font-weight:700;margin:0;}
.sec-h .sub{font-family:var(--mono);font-size:10.5px;color:var(--hint);margin-left:auto;}
/* grid */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(330px,1fr));gap:12px;}
.card{background:var(--paper);border:1px solid var(--line);border-radius:11px;padding:13px 15px;display:flex;flex-direction:column;}
.card.hide{display:none;}
.badges{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-bottom:7px;}
.bd{font-family:var(--mono);font-size:9.5px;font-weight:600;padding:2px 7px;border-radius:14px;letter-spacing:.02em;white-space:nowrap;}
.bd.plat{background:#f0ede4;color:var(--muted);}
.bd.long{background:var(--green-bg);color:var(--green);}
.bd.short{background:var(--red-bg);color:var(--red);}
.bd.neu{background:#f0ede4;color:var(--hint);}
.bd.g{background:#fff;border:1px solid var(--line);color:var(--hint);}
.card .ct{font-size:14px;font-weight:700;line-height:1.35;margin-bottom:5px;}
.card .sm{font-size:12.7px;color:#3a3a37;margin-bottom:8px;}
/* 投资落点：影响徽章 + 结论 + 原因1/2/3 */
.imp{display:flex;align-items:center;gap:6px;margin:1px 0 6px;flex-wrap:wrap;}
.imp .id{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:5px;white-space:nowrap;}
.id.d-上调{background:var(--green-bg);color:var(--green);}
.id.d-下调{background:var(--red-bg);color:var(--red);}
.id.d-确认{background:var(--blue-bg);color:var(--blue);}
.id.d-分歧{background:var(--coral-bg);color:var(--coral-dk);}
.id.d-观察{background:#f0ede4;color:var(--hint);}
.imp .io{font-family:var(--mono);font-size:10px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.imp .im-mag{font-family:var(--mono);font-size:10px;font-weight:600;color:var(--coral-dk);background:var(--coral-bg);border-radius:5px;padding:2px 7px;white-space:nowrap;}
.card .who{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:4px;}
.card .who b{color:var(--ink);font-weight:700;}
.card .cc{font-size:12.9px;font-weight:650;line-height:1.5;color:var(--ink);margin-bottom:6px;}
/* 盈利预测调整块（分析师笔法：指标 · 原值→新值 · 幅度 · 调后估值） */
.rev{border:1px solid var(--line);border-left:3px solid var(--blue);border-radius:8px;padding:7px 10px;margin:0 0 8px;background:#fcfbf8;}
.rev .rl{font-family:var(--mono);font-size:9px;font-weight:700;letter-spacing:.06em;color:var(--blue);margin-bottom:3px;}
.rev .rm{font-size:12px;line-height:1.5;color:var(--ink);}
.rev .rm b{font-family:var(--mono);font-size:11.5px;}
.rev .rm .old{color:var(--hint);text-decoration:line-through;text-decoration-color:#c9c5ba;}
.rev .rm .new{color:var(--green);font-weight:700;}
.rev .rm .chg{font-family:var(--mono);font-size:10.5px;color:var(--coral-dk);background:var(--coral-bg);border-radius:5px;padding:1px 6px;margin-left:4px;white-space:nowrap;}
.rev .rv{font-size:11.5px;line-height:1.5;color:var(--muted);margin-top:3px;padding-top:3px;border-top:1px dashed var(--line2);}
.rev .rv b{font-family:var(--mono);font-size:9px;color:var(--hint);letter-spacing:.05em;margin-right:4px;}
.card ol.rs{margin:0 0 7px;padding-left:17px;}
.card ol.rs li{font-size:12px;line-height:1.5;color:#54534e;margin:2px 0;}
.card .mp{font-size:11.8px;line-height:1.5;color:var(--coral-dk);background:var(--coral-bg);border-radius:7px;padding:6px 9px;margin:0 0 8px;}
.card .mp b{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;margin-right:4px;}
/* 主题内子聚类（同类内容放一起） */
.tgh{grid-column:1/-1;display:flex;align-items:center;gap:8px;margin:4px 0 -4px;}
.tgh .tn{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--coral-dk);}
.tgh .tc{font-family:var(--mono);font-size:10px;color:var(--hint);}
.tgh:after{content:'';flex:1;border-top:1px dashed var(--line);}
/* 观点汇总脉搏条（机械信号·py/JS 自算） */
.pulse{margin:12px 0 2px;padding:10px 0 2px;border-top:1px dashed var(--line);}
.pulse .pl{font-family:var(--mono);font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.prow{display:flex;flex-wrap:wrap;gap:6px;align-items:center;}
.pch{font-family:var(--mono);font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:14px;border:1px solid var(--line);background:#fff;cursor:pointer;white-space:nowrap;}
.pch:hover{border-color:var(--hint);}
.pth{display:flex;flex-wrap:wrap;gap:4px 12px;margin-top:6px;}
.pth .pt{font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;}
.pth .pt b{color:var(--ink);}
/* 盈利预测调整明细表（机械生成自 revision 字段） */
.rtab{margin-top:10px;overflow-x:auto;}
.rtab .rtl{font-family:var(--mono);font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:6px;}
.rtab table{width:100%;border-collapse:collapse;font-size:11.8px;line-height:1.45;}
.rtab th{font-family:var(--mono);font-size:9.5px;font-weight:700;color:var(--hint);text-align:left;padding:4px 8px;border-bottom:1px solid var(--line);letter-spacing:.04em;white-space:nowrap;}
.rtab td{padding:5px 8px;border-bottom:1px solid var(--line2);vertical-align:top;color:#3f3e3a;}
.rtab tr:hover td{background:#faf8f2;cursor:pointer;}
.rtab td.c-dir{white-space:nowrap;}
.rtab td.c-who{font-family:var(--mono);font-size:10.5px;white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
.rtab td.c-obj{white-space:nowrap;max-width:140px;overflow:hidden;text-overflow:ellipsis;font-weight:600;}
.rtab td.c-adj .o{color:var(--hint);text-decoration:line-through;text-decoration-color:#c9c5ba;}
.rtab td.c-adj .n{color:var(--green);font-weight:700;}
.rtab td.c-adj .g{font-family:var(--mono);font-size:10px;color:var(--coral-dk);}
.rtab td.c-val{color:var(--muted);}
.rtab td.c-dt{font-family:var(--mono);font-size:10px;color:var(--hint);white-space:nowrap;}
.nums{display:flex;flex-wrap:wrap;gap:5px;margin:2px 0 9px;}
.num{background:var(--bg);border:1px solid var(--line2);border-radius:6px;padding:3px 7px;font-family:var(--mono);font-size:10.5px;color:var(--coral-dk);}
.foot{margin-top:auto;display:flex;align-items:center;gap:8px;padding-top:7px;border-top:1px dashed var(--line);}
.foot .src{font-family:var(--mono);font-size:10px;color:var(--hint);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.foot .dt{font-family:var(--mono);font-size:10px;color:var(--hint);}
.foot a{font-family:var(--mono);font-size:10px;text-decoration:none;color:var(--coral);border:1px solid var(--line);border-radius:6px;padding:2px 7px;}
.foot a:hover{border-color:var(--coral);}
.empty{color:var(--hint);font-size:13px;padding:30px;text-align:center;}
/* 研判层 */
.brief{background:var(--paper);border:1px solid var(--line);border-left:4px solid var(--coral);border-radius:12px;padding:18px 22px 14px;margin-top:20px;}
.brief-top{display:flex;align-items:baseline;gap:10px;flex-wrap:wrap;margin-bottom:9px;}
.brief-top .tt{font-size:16px;font-weight:800;}
.brief-top .au{font-family:var(--mono);font-size:10px;color:#fff;background:var(--coral);border-radius:10px;padding:2px 9px;}
.brief-top .tg{font-family:var(--mono);font-size:10.5px;color:var(--hint);margin-left:auto;cursor:pointer;user-select:none;border:1px solid var(--line);border-radius:6px;padding:2px 8px;}
.brief-hl{font-size:14px;font-weight:600;line-height:1.6;color:var(--ink);padding-bottom:12px;border-bottom:1px dashed var(--line);}
.bblock{padding:13px 0 11px;border-bottom:1px dashed var(--line);}
.bblock:last-of-type{border-bottom:none;}
.bb-h{display:flex;align-items:center;gap:8px;margin-bottom:6px;flex-wrap:wrap;}
.bb-h .th{font-size:14.5px;font-weight:800;}
.bb-h .cf{font-family:var(--mono);font-size:10px;color:var(--hint);}
.bb-call{font-size:13.5px;font-weight:600;line-height:1.55;margin-bottom:8px;}
.bb-row{display:flex;gap:9px;font-size:12.6px;line-height:1.55;color:#3a3a37;margin:4px 0;}
.bb-row .lb2{flex:none;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 7px;border-radius:5px;height:fit-content;margin-top:2px;white-space:nowrap;}
.lb2.cons{background:#f0ede4;color:var(--muted);}
.lb2.div{background:var(--coral-bg);color:var(--coral-dk);}
.lb2.dlt{background:var(--blue-bg);color:var(--blue);}
.lb2.fal{background:var(--red-bg);color:var(--red);}
.bb-acts{display:flex;flex-direction:column;gap:4px;margin:6px 0 2px;}
.act{display:flex;gap:8px;align-items:baseline;font-size:12.6px;line-height:1.5;}
.act .at{flex:none;font-family:var(--mono);font-size:10px;font-weight:700;border-radius:5px;padding:2px 7px;}
.at.a-跟踪{background:var(--blue-bg);color:var(--blue);}
.at.a-核实{background:#FAF1DD;color:#7A5410;}
.at.a-idea{background:var(--green-bg);color:var(--green);}
.bb-refs{display:flex;gap:5px;flex-wrap:wrap;margin-top:7px;}
.ref{font-family:var(--mono);font-size:10px;color:var(--coral);border:1px solid var(--line);border-radius:12px;padding:2px 9px;cursor:pointer;background:#fff;}
.ref:hover{border-color:var(--coral);}
.brief-note{font-size:12.4px;line-height:1.6;color:var(--muted);background:var(--bg);border:1px solid var(--line2);border-radius:9px;padding:10px 13px;margin-top:12px;}
.brief-watch{margin-top:9px;}
.brief-watch .wi{font-size:12.4px;line-height:1.6;color:var(--muted);padding:3px 0 3px 16px;position:relative;}
.brief-watch .wi:before{content:'▸';position:absolute;left:2px;color:var(--hint);}
.brief.folded .brief-hl,.brief.folded .bblock,.brief.folded .brief-note,.brief.folded .brief-watch{display:none;}
.divg{font-family:var(--mono);font-size:9.5px;font-weight:700;background:var(--coral-bg);color:var(--coral-dk);border-radius:12px;padding:2px 8px;}
@media(max-width:620px){.grid{grid-template-columns:1fr;}}
</style></head>
<body>
<div class="wrap">
<header>

  <h1>多源观点聚合台</h1>

     <span class="lb" style="margin-left:14px;">影响</span><span id="dirchips"></span></div>
</div>

<div id="board"></div>
</div>

function tog(set,k,el,color){if(set.has(k)){set.delete(k);el.classList.remove('on');el.style.background='';el.style.color='';}else{set.add(k);el.classList.add('on');el.style.background=color;el.style.color='#fff';}}

function match(d){
  if(state.types.size&&!state.types.has(d.source_type))return false;
  if(state.plats.size&&!state.plats.has(d.platform))return false;
  if(state.stances.size&&!state.stances.has(d.stance))return false;
  if(state.dirs.size&&!state.dirs.has((d.impact||{}).dir||'观察'))return false;
  if(state.q){const rv=d.revision||{};const hay=(d.title+' '+(d.title_raw||'')+' '+d.summary+' '+(d.conclusion||'')+' '+(d.reasons||[]).join(' ')+' '+(d.who||'')+' '+(d.topic||'')+' '+(d.mispricing||'')+' '+(rv.metric||'')+' '+(rv.post_val||'')+' '+((d.impact||{}).obj||'')+' '+(d.nums||[]).join(' ')+' '+d.source+' '+d.theme).toLowerCase();if(!hay.includes(state.q))return false;}

}

// ── 观点汇总脉搏条（机械信号：全库 dir 计数 + 分主题分布，JS 自算）──
function pulseHTML(){
  const dirs=['上调','下调','确认','分歧','观察'];
  const cnt={};dirs.forEach(k=>cnt[k]=0);DATA.forEach(d=>cnt[dirOf(d)]++);
  let h='<div class="pulse"><div class="pl">观点汇总 · '+DATA.length+' 张（点击筛选）</div><div class="prow">'
    +dirs.filter(k=>cnt[k]).map(k=>'<span class="pch" data-dir="'+k+'" style="color:'+DIRCOLOR[k]+'">'+ARROW[k]+' '+k+' '+cnt[k]+'</span>').join('')
    +'</div><div class="pth">';
  THEMES.forEach(th=>{
    const a=DATA.filter(d=>d.theme===th);if(!a.length)return;
    const c={};dirs.forEach(k=>c[k]=0);a.forEach(d=>c[dirOf(d)]++);
    h+='<span class="pt"><b>'+esc(th)+'</b> '+dirs.filter(k=>c[k]).map(k=>'<span style="color:'+DIRCOLOR[k]+'">'+ARROW[k]+c[k]+'</span>').join(' ')+'</span>';
  });
  return h+'</div></div>';
}

function revTableHTML(){
  const dord={'上调':0,'下调':1,'确认':2,'分歧':3,'观察':4};
  const rows=DATA.filter(d=>d.revision).sort((a,b)=>{
    const da=dirOf(a),db=dirOf(b);
    if(dord[da]!==dord[db])return dord[da]-dord[db];
    return (b.date||'')<(a.date||'')?-1:1;
  });
  if(!rows.length)return '';
  let h='<div class="rtab"><div class="rtl">盈利预测调整明细 · '+rows.length+' 条（点行定位卡片）</div><table>'
    +'<tr><th>方向</th><th>机构</th><th>环节/公司</th><th>调整内容</th><th>调后估值/含义</th><th>日期</th></tr>';
  rows.forEach(d=>{
    const im=d.impact||{},rv=d.revision,dir=dirOf(d);
    h+='<tr data-q="'+esc(rv.metric)+'">'
      +'<td class="c-dir"><span style="color:'+DIRCOLOR[dir]+';font-weight:700">'+ARROW[dir]+' '+dir+'</span></td>'

      +'<td class="c-obj">'+esc(im.obj||d.theme)+'</td>'
      +'<td class="c-adj">'+esc(rv.metric)+'：<span class="o">'+esc(rv.old)+'</span> → <span class="n">'+esc(rv.new)+'</span>'+(rv.chg?' <span class="g">('+esc(rv.chg)+')</span>':'')+'</td>'
      +'<td class="c-val">'+esc(rv.post_val||'—')+'</td>'
      +'<td class="c-dt">'+esc((d.date||'').slice(5))+'</td></tr>';
  });
  return h+'</table></div>';
}
function bindRevTable(root){
  root.querySelectorAll('.rtab tr[data-q]').forEach(tr=>{tr.onclick=()=>{
    const q=document.getElementById('q');q.value=tr.dataset.q;q.dispatchEvent(new Event('input'));board.scrollIntoView({behavior:'smooth'});
  };});
}
function bindPulse(root){
  root.querySelectorAll('.pch').forEach(p=>{p.onclick=()=>{
    const k=p.dataset.dir;const chips=[...document.querySelectorAll('#dirchips .chip')];
    const el=chips.find(c=>c.textContent===k);if(el)el.click();
    p.classList.toggle('on');p.style.background=p.classList.contains('on')?DIRCOLOR[k]:'';p.style.color=p.classList.contains('on')?'#fff':DIRCOLOR[k];
  };});
}

// ── 研判层（主 agent 综合判断，构建器只搬运）──
function renderBrief(){
  const box=document.getElementById('briefbox');
  if(!BRIEF){
    const el=document.createElement('div');el.className='brief';
    el.innerHTML='<div class="brief-top"><span class="tt">观点汇总</span></div>'+pulseHTML()+revTableHTML();
    box.appendChild(el);bindPulse(el);bindRevTable(el);return;
  }
  const el=document.createElement('div');el.className='brief';
  let h='<div class="brief-top"><span class="tt">今日研判 · '+esc(BRIEF.date)+'</span>'
    +'<span class="au">〔'+esc(BRIEF.author||'AI观点')+'〕</span>'
    +'<span class="tg" id="brieftog">折叠 ▲</span></div>'
    +'<div class="brief-hl">'+esc(BRIEF.headline)+'</div>'
    +pulseHTML()+revTableHTML();
  (BRIEF.blocks||[]).forEach(b=>{
    h+='<div class="bblock"><div class="bb-h"><span class="th">'+esc(b.theme)+'</span>'
      +'<span class="bd '+stanceCls(b.stance)+'">'+stanceLbl(b.stance)+'</span>'
      +(b.confidence?'<span class="cf">置信度 '+esc(b.confidence)+'</span>':'')+'</div>'
      +'<div class="bb-call">'+esc(b.call)+'</div>'
      +(b.consensus?'<div class="bb-row"><span class="lb2 cons">共识≈已定价</span><span>'+esc(b.consensus)+'</span></div>':'')
      +(b.divergence?'<div class="bb-row"><span class="lb2 div">分歧=预期差</span><span>'+esc(b.divergence)+'</span></div>':'')
      +(b.delta?'<div class="bb-row"><span class="lb2 dlt">边际 Δ</span><span>'+esc(b.delta)+'</span></div>':'');
    if((b.actions||[]).length){
      h+='<div class="bb-acts">'+b.actions.map(a=>'<div class="act"><span class="at a-'+esc(a.type)+'">'+esc(a.type)+'</span><span>'+esc(a.txt)+'</span></div>').join('')+'</div>';
    }
    h+=(b.falsify?'<div class="bb-row"><span class="lb2 fal">证伪点</span><span>'+esc(b.falsify)+'</span></div>':'');
    if((b.refs||[]).length){
      h+='<div class="bb-refs">'+b.refs.map(r=>'<span class="ref" data-q="'+esc(r)+'">🔍 '+esc(r)+'</span>').join('')+'</div>';
    }
    h+='</div>';
  });
  if(BRIEF.cluster_note)h+='<div class="brief-note">'+esc(BRIEF.cluster_note)+'</div>';
  if((BRIEF.watch||[]).length)h+='<div class="brief-watch">'+BRIEF.watch.map(w=>'<div class="wi">'+esc(w)+'</div>').join('')+'</div>';
  el.innerHTML=h;box.appendChild(el);bindPulse(el);bindRevTable(el);
  el.querySelectorAll('.ref').forEach(r=>{r.onclick=()=>{const q=document.getElementById('q');q.value=r.dataset.q;q.dispatchEvent(new Event('input'));board.scrollIntoView({behavior:'smooth'});};});
  const tg=document.getElementById('brieftog');
  tg.onclick=()=>{el.classList.toggle('folded');tg.textContent=el.classList.contains('folded')?'展开 ▼':'折叠 ▲';};
}
renderBrief();

function render(){
  board.innerHTML='';let total=0;
  THEMES.forEach(th=>{
    const arr=DATA.filter(d=>d.theme===th&&match(d));
    if(!arr.length)return;total+=arr.length;
    const sec=document.createElement('div');sec.className='sec';
    const nL=arr.filter(d=>d.stance==='多').length,nS=arr.filter(d=>d.stance==='空').length;
    const divg=(nL&&nS)?'<span class="divg">⚡ 多空分歧 '+nL+'多/'+nS+'空</span>':'';
    sec.innerHTML='<div class="sec-h"><span class="n">'+String(THEMES.indexOf(th)+1).padStart(2,'0')+'</span><h2>'+th+'</h2>'+divg+'<span class="sub">'+arr.length+' 张</span></div>';
    const grid=document.createElement('div');grid.className='grid';
    // 同类内容放一起：按 topic 聚类（≥2 张成组带子标题，散卡归"其他信号"）
    const byTopic={};arr.forEach(d=>{const t=d.topic||'';(byTopic[t]=byTopic[t]||[]).push(d);});
    const groups=Object.entries(byTopic).filter(([t,a])=>t&&a.length>=2)
      .sort((a,b)=>{const dm=x=>Math.max(...x[1].map(c=>c.date||''));return dm(b)>dm(a)?1:dm(b)<dm(a)?-1:b[1].length-a[1].length;});
    const grouped=new Set();groups.forEach(([t,a])=>a.forEach(c=>grouped.add(c)));
    const rest=arr.filter(d=>!grouped.has(d));
    const ordered=[];
    groups.forEach(([t,a])=>{ordered.push({hdr:t,n:a.length});a.forEach(c=>ordered.push(c));});
    if(rest.length){if(groups.length)ordered.push({hdr:'其他信号',n:rest.length});rest.forEach(c=>ordered.push(c));}
    ordered.forEach(d=>{
      if(d.hdr){const hg=document.createElement('div');hg.className='tgh';hg.innerHTML='<span class="tn">▸ '+esc(d.hdr)+'</span><span class="tc">'+d.n+' 张</span>';grid.appendChild(hg);return;}
      const el=document.createElement('div');el.className='card';
      const tyBadge='<span class="bd" style="background:'+d._bg+';color:'+d._dk+'">'+d.source_type+'</span>';
      const nums=(d.nums||[]).map(n=>'<span class="num">'+esc(n)+'</span>').join('');
      const link=d.link?'<a href="'+encodeURI(d.link)+'" target="_blank">原文 ↗</a>':'';
      // 固定格式：谁(who) → 说什么(impact徽章+幅度+结论) → 为什么(reasons+预期差)；旧卡回退 summary
      let body;
      if(d.conclusion){
        const im=d.impact||{};
        const impLine='<div class="imp"><span class="id d-'+esc(im.dir||'观察')+'">'+(ARROW[im.dir]||'◌')+' '+esc(im.dir||'观察')+(im.dim?'·'+esc(im.dim):'')+'</span>'
          +(im.mag?'<span class="im-mag">'+esc(im.mag)+'</span>':'')
          +(im.obj?'<span class="io">'+esc(im.obj)+'</span>':'')+'</div>';
        // 盈利预测调整块（title 已是结论，conclusion 字段仅留数据层/检索）
        const rv=d.revision;
        const revBox=rv?('<div class="rev"><div class="rl">盈利预测调整</div>'
          +'<div class="rm"><b>'+esc(rv.metric)+'</b>：<span class="old">'+esc(rv.old)+'</span> → <span class="new">'+esc(rv.new)+'</span>'
          +(rv.chg?'<span class="chg">'+esc(rv.chg)+'</span>':'')+'</div>'
          +(rv.post_val?'<div class="rv"><b>调后估值/含义</b>'+esc(rv.post_val)+'</div>':'')+'</div>'):'';
        body=(d.who?'<div class="who">🗣 <b>'+esc(d.who)+'</b></div>':'')
          +impLine+revBox
          +((d.reasons||[]).length?'<ol class="rs">'+d.reasons.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ol>':'')
          +(d.mispricing?'<div class="mp"><b>预期差</b>'+esc(d.mispricing)+'</div>':'');
      }else{
        body='<div class="sm">'+esc(d.summary)+'</div>';
      }
      el.innerHTML='<div class="badges">'+tyBadge
        +'<span class="bd plat">'+d.platform+'</span>'
        +'<span class="bd '+stanceCls(d.stance)+'">'+({'多':'看多','空':'看空','中':'中性'}[d.stance]||'中性')+'</span>'
        +'<span class="bd g">'+d.grade+'</span></div>'
        +'<div class="ct">'+esc(d.title)+'</div>'
        +body
        +(nums?'<div class="nums">'+nums+'</div>':'')
        +'<div class="foot"><span class="src">'+esc(d.source)+'</span><span class="dt">'+(d.date||'')+'</span>'+link+'</div>';
      grid.appendChild(el);
    });
    sec.appendChild(grid);board.appendChild(sec);
  });
  if(!total)board.innerHTML='<div class="empty">没有匹配的观点卡</div>';
}
render();
</script>
</body></html>
