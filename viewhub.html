<!DOCTYPE html>
<html lang="zh-CN"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>外部&amp;外资观点聚合</title>
<style>
:root{
  --bg:#f5f5f7; --surface:#ffffff; --surface-2:#fbfbfd; --raised:#ffffff;
  --ink:#1d1d1f; --muted:#5c5c62; --hint:#86868b;
  --line:rgba(0,0,0,.09); --line-2:rgba(0,0,0,.055); --hair:rgba(0,0,0,.07);
  --accent:#0071e3; --accent-bg:rgba(0,113,227,.10);
  /* A 股惯例：上调/看多/好=红 · 下调/看空/差=绿 */
  --up:#d63a2e; --up-bg:rgba(214,58,46,.11);
  --down:#12894f; --down-bg:rgba(18,137,79,.11);
  --div:#c2761a; --div-bg:rgba(194,118,26,.12);
  --info:#0071e3; --info-bg:rgba(0,113,227,.10);
  --neu:#86868b; --neu-bg:rgba(120,120,128,.12);
  --shadow-s:0 .5px 1px rgba(0,0,0,.05),0 2px 6px rgba(0,0,0,.05);
  --shadow-m:0 1px 2px rgba(0,0,0,.05),0 8px 24px rgba(0,0,0,.07);
  --r-lg:20px; --r-md:15px; --r-sm:10px;
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","PingFang SC","Microsoft YaHei",sans-serif;
  /* 苹果风：全站用系统比例字体，等宽只留给纯数字对齐（tabular-nums），不再用 mono 面 */
  --mono:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei",sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --bg:#000000; --surface:#1c1c1e; --surface-2:#161618; --raised:#232325;
  --ink:#f5f5f7; --muted:#a1a1a8; --hint:#8a8a90;
  --line:rgba(255,255,255,.11); --line-2:rgba(255,255,255,.07); --hair:rgba(255,255,255,.09);
  --accent:#0a84ff; --accent-bg:rgba(10,132,255,.16);
  --up:#ff6961; --up-bg:rgba(255,105,97,.16);
  --down:#30d158; --down-bg:rgba(48,209,88,.15);
  --div:#ffb84d; --div-bg:rgba(255,184,77,.15);
  --info:#0a84ff; --info-bg:rgba(10,132,255,.16);
  --neu:#98989f; --neu-bg:rgba(152,152,159,.16);
  --shadow-s:0 .5px 1px rgba(0,0,0,.4); --shadow-m:0 8px 28px rgba(0,0,0,.5);
}}
*{box-sizing:border-box;}
html{-webkit-text-size-adjust:100%;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
  font-size:14.5px;line-height:1.55;-webkit-font-smoothing:antialiased;font-optical-sizing:auto;
  font-variant-numeric:tabular-nums;}
/* 小标签：轻量 SF caption，取代原 mono 标签的"终端感" */
.kick,.meta,.rtl,.pl,.frow .lb,.today-h .sub,.sec-h .n,.sec-h .sub,.tc-th{letter-spacing:.01em !important;}
.wrap{max-width:1160px;margin:0 auto;padding:30px 22px 90px;}
a{color:var(--accent);}

/* ── header ── */
header{padding-bottom:20px;}
.kick{font-family:var(--mono);font-size:11px;letter-spacing:.10em;text-transform:uppercase;
  color:var(--accent);margin:0 0 9px;font-weight:600;}
h1{font-size:34px;font-weight:700;margin:0 0 9px;letter-spacing:-.021em;line-height:1.05;}
.meta{font-family:var(--mono);font-size:12px;color:var(--hint);letter-spacing:.01em;}

/* ── 研判层 brief ── */
.brief{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-lg);
  box-shadow:var(--shadow-m);padding:22px 26px 18px;margin-top:22px;}
.brief-top{display:flex;align-items:center;gap:11px;flex-wrap:wrap;margin-bottom:12px;}
.brief-top .tt{font-size:19px;font-weight:700;letter-spacing:-.01em;}
.brief-top .au{font-family:var(--mono);font-size:10.5px;color:#fff;background:var(--accent);border-radius:20px;padding:3px 11px;font-weight:600;}
.brief-top .tg{font-family:var(--mono);font-size:11px;color:var(--muted);margin-left:auto;cursor:pointer;
  user-select:none;border:.5px solid var(--line);border-radius:20px;padding:4px 12px;transition:transform .1s;}
.brief-top .tg:active{transform:scale(.96);}
.brief-hl{font-size:15.5px;font-weight:600;line-height:1.65;color:var(--ink);padding-bottom:14px;border-bottom:.5px solid var(--hair);}
.bblock{padding:15px 0 13px;border-bottom:.5px solid var(--hair);}
.bblock:last-of-type{border-bottom:none;}
.bb-h{display:flex;align-items:center;gap:9px;margin-bottom:7px;flex-wrap:wrap;}
.bb-h .th{font-size:15.5px;font-weight:700;}
.bb-h .cf{font-family:var(--mono);font-size:10.5px;color:var(--hint);}
.bb-call{font-size:14.5px;font-weight:600;line-height:1.6;margin-bottom:9px;}
.bb-row{display:flex;gap:10px;font-size:13.5px;line-height:1.6;color:var(--muted);margin:5px 0;}
.bb-row .lb2{flex:none;font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;height:fit-content;margin-top:2px;white-space:nowrap;}
.lb2.cons{background:var(--neu-bg);color:var(--muted);}
.lb2.div{background:var(--div-bg);color:var(--div);}
.lb2.dlt{background:var(--info-bg);color:var(--info);}
.lb2.fal{background:var(--up-bg);color:var(--up);}
.bb-acts{display:flex;flex-direction:column;gap:5px;margin:8px 0 2px;}
.act{display:flex;gap:9px;align-items:baseline;font-size:13.5px;line-height:1.55;}
.act .at{flex:none;font-family:var(--mono);font-size:10px;font-weight:700;border-radius:6px;padding:2px 8px;}
.at.a-跟踪{background:var(--info-bg);color:var(--info);}
.at.a-核实{background:var(--div-bg);color:var(--div);}
.at.a-idea{background:var(--down-bg);color:var(--down);}
.bb-refs{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
.ref{font-family:var(--mono);font-size:10.5px;color:var(--accent);border:.5px solid var(--line);border-radius:20px;padding:3px 11px;cursor:pointer;background:var(--surface);transition:transform .1s;}
.ref:active{transform:scale(.95);}
.brief-note{font-size:13px;line-height:1.65;color:var(--muted);background:var(--surface-2);border:.5px solid var(--line-2);border-radius:var(--r-md);padding:12px 15px;margin-top:14px;}
.brief-watch{margin-top:11px;}
.brief-watch .wi{font-size:13px;line-height:1.65;color:var(--muted);padding:3px 0 3px 18px;position:relative;}
.brief-watch .wi:before{content:'›';position:absolute;left:4px;color:var(--hint);font-weight:700;}
.brief.folded .brief-hl,.brief.folded .bblock,.brief.folded .brief-note,.brief.folded .brief-watch{display:none;}

/* ── 今日焦点 today band ── */
.today{margin-top:22px;}
.today-h{display:flex;align-items:baseline;gap:11px;margin-bottom:13px;}
.today-h .dot{width:8px;height:8px;border-radius:50%;background:var(--up);box-shadow:0 0 0 4px var(--up-bg);flex:none;align-self:center;}
.today-h h2{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;}
.today-h .sub{font-family:var(--mono);font-size:11px;color:var(--hint);}
.tgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:13px;}
.tcard{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--shadow-s);padding:15px 17px;cursor:pointer;position:relative;overflow:hidden;
  transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s;}
.tcard:before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--dirc,var(--neu));}
.tcard:hover{transform:translateY(-2px);box-shadow:var(--shadow-m);}
.tcard:active{transform:translateY(0) scale(.995);}
.tc-top{display:flex;align-items:center;gap:7px;margin-bottom:8px;flex-wrap:wrap;}
.tc-dir{font-family:var(--mono);font-size:10px;font-weight:700;padding:2px 8px;border-radius:6px;white-space:nowrap;}
.tc-th{font-family:var(--mono);font-size:10px;color:var(--hint);}
.tc-sig{margin-left:auto;display:flex;gap:2.5px;align-items:center;}
.tc-sig i{width:5px;height:5px;border-radius:50%;background:var(--line);display:block;}
.tc-sig i.on{background:var(--up);}
.tc-title{font-size:14.5px;font-weight:650;line-height:1.4;margin-bottom:6px;letter-spacing:-.005em;}
.tc-who{font-family:var(--mono);font-size:10.5px;color:var(--muted);margin-bottom:5px;}
.tc-mp{font-size:12px;line-height:1.5;color:var(--up);}
.tc-mp b{font-family:var(--mono);font-size:9px;letter-spacing:.04em;margin-right:5px;color:var(--hint);font-weight:700;}

/* ── 观点汇总脉搏条 ── */
.pulse{margin:16px 0 2px;padding:14px 0 2px;border-top:.5px solid var(--hair);}
.pulse .pl{font-family:var(--mono);font-size:10.5px;color:var(--hint);text-transform:uppercase;letter-spacing:.06em;margin-bottom:9px;}
.prow{display:flex;flex-wrap:wrap;gap:7px;align-items:center;}
.pch{font-family:var(--mono);font-size:11px;font-weight:600;padding:4px 11px;border-radius:20px;border:.5px solid var(--line);background:var(--surface);cursor:pointer;white-space:nowrap;transition:transform .1s;}
.pch:active{transform:scale(.95);}
.pth{display:flex;flex-wrap:wrap;gap:5px 14px;margin-top:9px;}
.pth .pt{font-family:var(--mono);font-size:10.5px;color:var(--muted);white-space:nowrap;}
.pth .pt b{color:var(--ink);}

/* ── 盈利预测调整明细表 ── */
.rtab{margin-top:14px;overflow-x:auto;}
.rtab .rtl{font-size:11.5px;color:var(--hint);font-weight:600;letter-spacing:.02em;margin-bottom:10px;}
.rtab table{width:100%;border-collapse:collapse;font-size:13px;line-height:1.5;}
.rtab th{font-size:11px;font-weight:600;color:var(--hint);text-align:left;padding:6px 14px 9px;letter-spacing:.02em;white-space:nowrap;}
.rtab td{padding:11px 14px;border-top:.5px solid var(--line-2);vertical-align:top;color:var(--muted);}
.rtab tr[data-q]{cursor:pointer;transition:background .12s;}
.rtab tr[data-q]:hover td{background:var(--surface-2);}
.rtab td.c-dir{white-space:nowrap;font-weight:600;}
.rtab td.c-who{font-size:12.5px;white-space:nowrap;max-width:170px;overflow:hidden;text-overflow:ellipsis;}
.rtab td.c-obj{white-space:nowrap;max-width:160px;overflow:hidden;text-overflow:ellipsis;font-weight:650;color:var(--ink);}
.rtab td.c-adj .o{color:var(--hint);text-decoration:line-through;text-decoration-color:var(--line);}
.rtab td.c-adj .n{color:var(--up);font-weight:700;}
.rtab td.c-adj .g{font-size:11.5px;color:var(--div);font-weight:600;}
.rtab td.c-val{color:var(--muted);}
.rtab td.c-dt{font-size:11.5px;color:var(--hint);white-space:nowrap;text-align:right;}

/* ── filters (frosted sticky) ── */
.filters{position:sticky;top:0;z-index:20;margin:26px 0 6px;padding:13px 16px;
  background:color-mix(in srgb,var(--bg) 72%,transparent);
  -webkit-backdrop-filter:blur(20px) saturate(180%);backdrop-filter:blur(20px) saturate(180%);
  border:.5px solid var(--line);border-radius:var(--r-md);box-shadow:var(--shadow-s);}
.frow{display:flex;flex-wrap:wrap;align-items:center;gap:8px;}
.frow+.frow{margin-top:9px;}
.frow .lb{font-family:var(--mono);font-size:10px;color:var(--hint);text-transform:uppercase;letter-spacing:.05em;margin-right:4px;}
.search{position:relative;flex:1;min-width:220px;}
.search input{width:100%;padding:9px 13px 9px 34px;border:.5px solid var(--line);border-radius:11px;
  background:var(--surface);color:var(--ink);font-size:13.5px;font-family:var(--sans);outline:none;transition:border-color .15s,box-shadow .15s;}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-bg);}
.search svg{position:absolute;left:11px;top:10px;width:15px;height:15px;stroke:var(--hint);fill:none;}
.chip{font-family:var(--mono);font-size:11.5px;font-weight:600;padding:5px 13px;border-radius:20px;
  border:.5px solid var(--line);background:var(--surface);color:var(--muted);cursor:pointer;user-select:none;white-space:nowrap;transition:transform .1s,border-color .15s;}
.chip:hover{border-color:var(--hint);}
.chip:active{transform:scale(.94);}
.chip.on{color:#fff;border-color:transparent;}

/* ── section / grid / card ── */
.sec{margin-top:34px;}
.sec-h{display:flex;align-items:baseline;gap:11px;padding-bottom:9px;margin-bottom:16px;border-bottom:.5px solid var(--hair);}
.sec-h .n{font-family:var(--mono);font-size:12px;color:var(--accent);font-weight:700;}
.sec-h h2{font-size:19px;font-weight:700;margin:0;letter-spacing:-.01em;}
.sec-h .sub{font-family:var(--mono);font-size:11px;color:var(--hint);margin-left:auto;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:14px;}
.card{background:var(--surface);border:.5px solid var(--line);border-radius:var(--r-md);
  box-shadow:var(--shadow-s);padding:16px 18px;display:flex;flex-direction:column;
  transition:transform .18s cubic-bezier(.2,.7,.2,1),box-shadow .18s;}
.card:hover{transform:translateY(-2px);box-shadow:var(--shadow-m);}
.card.hide{display:none;}
.badges{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:9px;}
.bd{font-family:var(--mono);font-size:10px;font-weight:600;padding:2.5px 9px;border-radius:20px;letter-spacing:.01em;white-space:nowrap;}
.bd.plat{background:var(--neu-bg);color:var(--muted);}
.bd.long{background:var(--up-bg);color:var(--up);}
.bd.short{background:var(--down-bg);color:var(--down);}
.bd.neu{background:var(--neu-bg);color:var(--hint);}
.bd.g{background:var(--surface);border:.5px solid var(--line);color:var(--hint);}
.bd.today{background:var(--up);color:#fff;}
.card .ct{font-size:15px;font-weight:680;line-height:1.4;margin-bottom:7px;letter-spacing:-.006em;}
.card .sm{font-size:13.5px;color:var(--muted);margin-bottom:9px;}
.imp{display:flex;align-items:center;gap:7px;margin:1px 0 8px;flex-wrap:wrap;}
.imp .id{font-family:var(--mono);font-size:10.5px;font-weight:700;padding:2.5px 9px;border-radius:7px;white-space:nowrap;}
.id.d-上调{background:var(--up-bg);color:var(--up);}
.id.d-下调{background:var(--down-bg);color:var(--down);}
.id.d-确认{background:var(--info-bg);color:var(--info);}
.id.d-分歧{background:var(--div-bg);color:var(--div);}
.id.d-观察{background:var(--neu-bg);color:var(--hint);}
.imp .io{font-family:var(--mono);font-size:10.5px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.imp .im-mag{font-family:var(--mono);font-size:10.5px;font-weight:600;color:var(--div);background:var(--div-bg);border-radius:7px;padding:2.5px 9px;white-space:nowrap;}
.card .who{font-family:var(--mono);font-size:11px;color:var(--muted);margin-bottom:6px;}
.card .who b{color:var(--ink);font-weight:700;}
.rev{border:.5px solid var(--line);border-left:3px solid var(--info);border-radius:var(--r-sm);padding:9px 12px;margin:0 0 9px;background:var(--surface-2);}
.rev .rl{font-family:var(--mono);font-size:9.5px;font-weight:700;letter-spacing:.05em;color:var(--info);margin-bottom:4px;}
.rev .rm{font-size:12.5px;line-height:1.55;color:var(--ink);}
.rev .rm b{font-family:var(--mono);font-size:12px;}
.rev .rm .old{color:var(--hint);text-decoration:line-through;text-decoration-color:var(--line);}
.rev .rm .new{color:var(--up);font-weight:700;}
.rev .rm .chg{font-family:var(--mono);font-size:10.5px;color:var(--div);background:var(--div-bg);border-radius:6px;padding:1px 7px;margin-left:5px;white-space:nowrap;}
.rev .rv{font-size:12px;line-height:1.55;color:var(--muted);margin-top:5px;padding-top:5px;border-top:.5px dashed var(--line-2);}
.rev .rv b{font-family:var(--mono);font-size:9.5px;color:var(--hint);letter-spacing:.04em;margin-right:5px;}
.card ol.rs{margin:0 0 8px;padding-left:18px;}
.card ol.rs li{font-size:12.5px;line-height:1.55;color:var(--muted);margin:3px 0;}
.card .mp{font-size:12.5px;line-height:1.55;color:var(--up);background:var(--up-bg);border-radius:9px;padding:8px 11px;margin:0 0 9px;}
.card .mp b{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;margin-right:5px;color:var(--hint);font-weight:700;}
.tgh{grid-column:1/-1;display:flex;align-items:center;gap:9px;margin:6px 0 -4px;}
.tgh .tn{font-family:var(--mono);font-size:11.5px;font-weight:700;color:var(--div);}
.tgh .tc{font-family:var(--mono);font-size:10.5px;color:var(--hint);}
.tgh:after{content:'';flex:1;border-top:.5px dashed var(--line);}
.nums{display:flex;flex-wrap:wrap;gap:6px;margin:2px 0 10px;}
.num{background:var(--surface-2);border:.5px solid var(--line-2);border-radius:7px;padding:3px 8px;font-family:var(--mono);font-size:10.5px;color:var(--div);}
.foot{margin-top:auto;display:flex;align-items:center;gap:9px;padding-top:9px;border-top:.5px solid var(--hair);}
.foot .src{font-family:var(--mono);font-size:10.5px;color:var(--hint);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.foot .dt{font-family:var(--mono);font-size:10.5px;color:var(--hint);}
.foot a{font-family:var(--mono);font-size:10.5px;text-decoration:none;color:var(--accent);border:.5px solid var(--line);border-radius:20px;padding:3px 10px;transition:transform .1s;}
.foot a:active{transform:scale(.95);}
.divg{font-family:var(--mono);font-size:9.5px;font-weight:700;background:var(--div-bg);color:var(--div);border-radius:20px;padding:2.5px 9px;}
.empty{color:var(--hint);font-size:13.5px;padding:40px;text-align:center;}
@media(max-width:640px){.grid,.tgrid{grid-template-columns:1fr;}.wrap{padding:22px 16px 70px;}h1{font-size:27px;}}
@media(prefers-reduced-motion:reduce){*{transition:none !important;}.card:hover,.tcard:hover{transform:none;}}
@media(prefers-reduced-transparency:reduce){.filters{background:var(--bg);backdrop-filter:none;-webkit-backdrop-filter:none;}}
</style></head>
<body>
<div class="wrap">
<header>
  <p class="kick">公众号 × 知识星球（180K Research · 2030FY）· 多源观点聚合</p>
  <h1>外部&amp;外资观点聚合</h1>
  <div class="meta" id="metaline">237 张观点卡 · 10 主题 · 2026-07-10 ~ 2026-07-22 · 源：公众号/星球</div>
</header>

<div id="briefbox"></div>
<div id="todaybox"></div>

<div class="filters">
  <div class="frow">
    <div class="search">
      <svg viewBox="0 0 24 24" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="16.5" y1="16.5" x2="21" y2="21"/></svg>
      <input id="q" type="text" placeholder="搜索标题 / 摘要 / 数字 / 来源…" autocomplete="off">
    </div>
  </div>
  <div class="frow"><span class="lb">观点类型</span><span id="typechips"></span></div>
  <div class="frow"><span class="lb">平台</span><span id="platchips"></span>
     <span class="lb" style="margin-left:14px;">多空</span><span id="stancechips"></span>
     <span class="lb" style="margin-left:14px;">影响</span><span id="dirchips"></span></div>
</div>

<div id="board"></div>

function pulseHTML(){

    const a=DATA.filter(d=>d.theme===th);if(!a.length)return;

      +(b.divergence?'<div class="bb-row"><span class="lb2 div">分歧=预期差</span><span>'+esc(b.divergence)+'</span></div>':'')
      +(b.delta?'<div class="bb-row"><span class="lb2 dlt">边际 Δ</span><span>'+esc(b.delta)+'</span></div>':'');
    if((b.actions||[]).length){
      h+='<div class="bb-acts">'+b.actions.map(a=>'<div class="act"><span class="at a-'+esc(a.type)+'">'+esc(a.type)+'</span><span>'+esc(a.txt)+'</span></div>').join('')+'</div>';
    }
    h+=(b.falsify?'<div class="bb-row"><span class="lb2 fal">证伪点</span><span>'+esc(b.falsify)+'</span></div>':'');
    if((b.refs||[]).length){
      h+='<div class="bb-refs">'+b.refs.map(r=>'<span class="ref" data-q="'+esc(r)+'">🔍 '+esc(r)+'</span>').join('')+'</div>';
    }
    h+='</div>';
  });
  if(BRIEF.cluster_note)h+='<div class="brief-note">'+esc(BRIEF.cluster_note)+'</div>';
  if((BRIEF.watch||[]).length)h+='<div class="brief-watch">'+BRIEF.watch.map(w=>'<div class="wi">'+esc(w)+'</div>').join('')+'</div>';
  el.innerHTML=h;box.appendChild(el);bindPulse(el);bindRevTable(el);
  el.querySelectorAll('.ref').forEach(r=>{r.onclick=()=>{const q=document.getElementById('q');q.value=r.dataset.q;q.dispatchEvent(new Event('input'));board.scrollIntoView({behavior:'smooth'});};});
  const tg=document.getElementById('brieftog');
  tg.onclick=()=>{el.classList.toggle('folded');tg.textContent=el.classList.contains('folded')?'展开 ▼':'折叠 ▲';};
}
renderBrief();
renderToday();

function render(){
  board.innerHTML='';let total=0;
  THEMES.forEach(th=>{
    const arr=DATA.filter(d=>d.theme===th&&match(d));
    if(!arr.length)return;total+=arr.length;
    const sec=document.createElement('div');sec.className='sec';
    const nL=arr.filter(d=>d.stance==='多').length,nS=arr.filter(d=>d.stance==='空').length;
    const divg=(nL&&nS)?'<span class="divg">⚡ 多空分歧 '+nL+'多/'+nS+'空</span>':'';
    sec.innerHTML='<div class="sec-h"><span class="n">'+String(THEMES.indexOf(th)+1).padStart(2,'0')+'</span><h2>'+th+'</h2>'+divg+'<span class="sub">'+arr.length+' 张</span></div>';
    const grid=document.createElement('div');grid.className='grid';
    const byTopic={};arr.forEach(d=>{const t=d.topic||'';(byTopic[t]=byTopic[t]||[]).push(d);});
    const groups=Object.entries(byTopic).filter(([t,a])=>t&&a.length>=2)
      .sort((a,b)=>{const dm=x=>Math.max(...x[1].map(c=>c.date||''));return dm(b)>dm(a)?1:dm(b)<dm(a)?-1:b[1].length-a[1].length;});
    const grouped=new Set();groups.forEach(([t,a])=>a.forEach(c=>grouped.add(c)));
    const rest=arr.filter(d=>!grouped.has(d));
    const ordered=[];
    groups.forEach(([t,a])=>{ordered.push({hdr:t,n:a.length});a.forEach(c=>ordered.push(c));});
    if(rest.length){if(groups.length)ordered.push({hdr:'其他信号',n:rest.length});rest.forEach(c=>ordered.push(c));}
    ordered.forEach(d=>{
      if(d.hdr){const hg=document.createElement('div');hg.className='tgh';hg.innerHTML='<span class="tn">▸ '+esc(d.hdr)+'</span><span class="tc">'+d.n+' 张</span>';grid.appendChild(hg);return;}
      const el=document.createElement('div');el.className='card';
      const tyBadge='<span class="bd" style="background:'+d._bg+';color:'+d._dk+'">'+d.source_type+'</span>';
      const todayBadge=(d.date===ANCHOR)?'<span class="bd today">今日</span>':'';
      const nums=(d.nums||[]).map(n=>'<span class="num">'+esc(n)+'</span>').join('');
      const link=d.link?'<a href="'+encodeURI(d.link)+'" target="_blank">原文 ↗</a>':'';
      let body;
      if(d.conclusion){
        const im=d.impact||{};
        const impLine='<div class="imp"><span class="id d-'+esc(im.dir||'观察')+'">'+(ARROW[im.dir]||'○')+' '+esc(im.dir||'观察')+(im.dim?'·'+esc(im.dim):'')+'</span>'
          +(im.mag?'<span class="im-mag">'+esc(im.mag)+'</span>':'')
          +(im.obj?'<span class="io">'+esc(im.obj)+'</span>':'')+'</div>';
        const rv=d.revision;
        const revBox=rv?('<div class="rev"><div class="rl">盈利预测调整</div>'
          +'<div class="rm"><b>'+esc(rv.metric)+'</b>：<span class="old">'+esc(rv.old)+'</span> → <span class="new">'+esc(rv.new)+'</span>'
          +(rv.chg?'<span class="chg">'+esc(rv.chg)+'</span>':'')+'</div>'
          +(rv.post_val?'<div class="rv"><b>调后估值/含义</b>'+esc(rv.post_val)+'</div>':'')+'</div>'):'';
        body=(d.who?'<div class="who">🗣 <b>'+esc(d.who)+'</b></div>':'')
          +impLine+revBox
          +((d.reasons||[]).length?'<ol class="rs">'+d.reasons.map(r=>'<li>'+esc(r)+'</li>').join('')+'</ol>':'')
          +(d.mispricing?'<div class="mp"><b>预期差</b>'+esc(d.mispricing)+'</div>':'');
      }else{
        body='<div class="sm">'+esc(d.summary)+'</div>';
      }
      el.innerHTML='<div class="badges">'+tyBadge+todayBadge
        +'<span class="bd plat">'+d.platform+'</span>'
        +'<span class="bd '+stanceCls(d.stance)+'">'+({'多':'看多','空':'看空','中':'中性'}[d.stance]||'中性')+'</span>'
        +'<span class="bd g">'+d.grade+'</span></div>'
        +'<div class="ct">'+esc(d.title)+'</div>'
        +body
        +(nums?'<div class="nums">'+nums+'</div>':'')
        +'<div class="foot"><span class="src">'+esc(d.source)+'</span><span class="dt">'+(d.date||'')+'</span>'+link+'</div>';
      grid.appendChild(el);
    });
    sec.appendChild(grid);board.appendChild(sec);
  });
  if(!total)board.innerHTML='<div class="empty">没有匹配的观点卡</div>';
}
render();
</script>
</body></html>
