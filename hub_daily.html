<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>AI 日报聚合台</title>
<style>
  :root{
    --accent:#007AFF; --accent-soft:rgba(0,122,255,.10);
    --bg:#F2F5FA; --paper:#fff;
    --sb:rgba(250,251,254,.72); --toolbar:rgba(255,255,255,.72);
    --label:#1C1C1E; --label-2:rgba(60,60,67,.72); --label-3:rgba(60,60,67,.45);
    --sep:rgba(60,60,67,.14);
    --green:#34C759; --orange:#FF9500;
    --shadow-soft:0 1px 2px rgba(20,40,70,.05), 0 6px 18px rgba(20,40,70,.06);
    --shadow:0 2px 6px rgba(20,40,70,.08), 0 14px 34px rgba(20,40,70,.11);
    --ease:cubic-bezier(.32,.72,.28,1);
  }
  *{box-sizing:border-box}
  html,body{height:100%;margin:0}
  html{background:var(--bg)}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text","PingFang SC","Microsoft YaHei UI","Microsoft YaHei","Segoe UI",system-ui,sans-serif;
    color:var(--label);
    background:
      radial-gradient(900px 480px at 8% -6%, rgba(76,177,255,.16), transparent),
      radial-gradient(820px 520px at 98% 2%, rgba(175,82,222,.07), transparent),
      var(--bg);
    display:flex; height:100vh; overflow:hidden;
    -webkit-font-smoothing:antialiased;
  }
  .icn{width:1em;height:1em;stroke:currentColor;fill:none;stroke-width:1.7;
    stroke-linecap:round;stroke-linejoin:round;flex:none;vertical-align:-.14em}

  /* ── 左侧目录（唯一毛玻璃层） ── */
  aside{
    width:210px; flex:0 0 auto; height:100vh;
    background:var(--sb); border-right:.5px solid var(--sep);
    -webkit-backdrop-filter:blur(24px) saturate(170%); backdrop-filter:blur(24px) saturate(170%);
    display:flex; flex-direction:column;
  }
  .sb-h{padding:18px 16px 13px; border-bottom:.5px solid var(--sep);}
  .sb-h h1{font-size:15.5px; margin:0; font-weight:740; letter-spacing:-.02em;
    display:flex; align-items:center; gap:8px;}
  .sb-h h1 .bi{width:26px;height:26px;border-radius:8px;flex:none;display:flex;
    align-items:center;justify-content:center;font-size:15px;color:#fff;
    background:linear-gradient(180deg,#3FA2FF,var(--accent));
    box-shadow:0 2px 6px rgba(0,122,255,.28),inset 0 1px 0 rgba(255,255,255,.32);}
  .sb-h .sub{font-size:10.5px; color:var(--label-3); line-height:1.55; margin-top:8px;}
  .sb-h .sub .k{display:inline-flex;align-items:center;gap:4px;margin-right:9px}
  .sb-h .sub .d{width:7px;height:7px;border-radius:50%;display:inline-block}
  nav{flex:1; overflow-y:auto; padding:8px 0 24px;}
  .grp{display:flex; align-items:center; gap:7px; padding:14px 16px 5px;
    font-size:10px; font-weight:680; letter-spacing:.09em; color:var(--label-3);
    text-transform:uppercase;}
  .grp .gi{font-size:13px; color:var(--label-3)}
  .item{
    display:flex; align-items:center; flex-wrap:wrap; gap:9px;
    margin:1px 8px; padding:8px 11px; border-radius:11px; cursor:pointer;
    font-size:13px; font-weight:540; color:var(--label-2); user-select:none;
    transition:background .15s ease, color .15s ease, transform .1s ease;
  }
  .item:hover{background:rgba(118,118,128,.09); color:var(--label);}
  .item:active{transform:scale(.98);}
  .item.active{background:var(--accent-soft); color:var(--accent); font-weight:650;}
  .dot{width:7px;height:7px;border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 3px rgba(0,0,0,0)}
  .dot.stable{background:var(--green)}
  .dot.tunnel{background:var(--orange)}
  .dot.local{background:#B0B0B8}
  .item small{margin-left:auto; color:var(--label-3); font-size:10px; font-weight:500;}
  .item small.note{flex-basis:100%; margin-left:16px; margin-top:2px; line-height:1.45;
    color:var(--label-2); font-weight:500; white-space:normal;
    display:flex; align-items:baseline; gap:4px;}
  .item small.note .icn{font-size:10px;color:var(--orange);vertical-align:-.05em}

  /* ── 右侧 ── */
  main{flex:1; min-width:0; display:flex; flex-direction:column; height:100vh;}
  .toolbar{
    flex:0 0 auto; background:var(--toolbar); border-bottom:.5px solid var(--sep);
    -webkit-backdrop-filter:blur(20px) saturate(160%); backdrop-filter:blur(20px) saturate(160%);
    padding:10px 16px; display:flex; align-items:center; gap:11px; flex-wrap:wrap; font-size:12px;
  }
  #curName{font-weight:700; font-size:13.5px; letter-spacing:-.01em;}
  button.act,a.act{
    display:inline-flex; align-items:center; gap:6px;
    border:.5px solid var(--sep); background:rgba(255,255,255,.72); border-radius:10px;
    padding:6px 13px; cursor:pointer; font-size:12.5px; font-weight:620; color:var(--label-2);
    font-family:inherit; text-decoration:none;
    transition:transform .12s var(--ease), background .14s ease, color .14s ease, border-color .14s ease;
  }
  button.act:hover,a.act:hover{background:#fff; color:var(--label); border-color:rgba(60,60,67,.22)}
  button.act:active,a.act:active{transform:scale(.965)}
  a.act#btnOpen{color:var(--accent); border-color:var(--accent-soft); background:var(--accent-soft)}
  a.act#btnOpen:hover{background:rgba(0,122,255,.16); color:var(--accent)}
  .url{color:var(--label-3); font-family:ui-monospace,"SF Mono",Consolas,monospace; font-size:11px;
    overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:34vw}
  .spacer{flex:1 1 auto}
  .frameWrap{flex:1 1 auto; position:relative; padding:12px; display:flex; background:var(--bg)}
  .card{flex:1; position:relative; border-radius:14px; overflow:hidden;
    border:.5px solid var(--sep); box-shadow:var(--shadow-soft); background:#fff}
  iframe{width:100%; height:100%; border:0; background:#fff}
  #hintbox{
    position:absolute; inset:0; display:none; align-items:center; justify-content:center;
    text-align:center; color:var(--label-2); font-size:13.5px; padding:24px; line-height:1.85;
    background:var(--paper);
  }
  #hintbox.show{display:flex}
  @media (max-width:720px){ aside{width:164px} .item{font-size:12px} }
  body.embed .sb-h h1{font-size:13.5px}
  @media (prefers-reduced-motion:reduce){ *{transition-duration:.01ms!important} .item:active{transform:none} }
</style>
</head>
<body>
<svg width="0" height="0" style="position:absolute" aria-hidden="true"><defs>
  <symbol id="i-news" viewBox="0 0 24 24"><path d="M4 5.5h11c.6 0 1 .4 1 1V18c0 .8.7 1.5 1.5 1.5S19 18.8 19 18V8.5c0-.6.4-1 1-1"/><path d="M4 5.5v13c0 .6.4 1 1 1h12.5"/><path d="M6.5 9h6M6.5 12.5h6M6.5 16h4"/></symbol>
  <symbol id="i-cube" viewBox="0 0 24 24"><path d="M12 3l8 4.5v9L12 21l-8-4.5v-9z"/><path d="M4 7.5l8 4.5 8-4.5M12 12v9"/></symbol>
  <symbol id="i-cart" viewBox="0 0 24 24"><path d="M4 5h2l1.6 9.2c.1.7.7 1.3 1.5 1.3h7.6c.8 0 1.4-.6 1.5-1.3L20 8H7"/><circle cx="9.5" cy="19" r="1.3"/><circle cx="17" cy="19" r="1.3"/></symbol>
  <symbol id="i-building" viewBox="0 0 24 24"><rect x="5" y="4" width="10" height="16.5" rx="1.2"/><path d="M15 10h3c.6 0 1 .4 1 1v9.5M8.5 8h3M8.5 12h3M8.5 16h3M15 20.5h4"/></symbol>
  <symbol id="i-chart" viewBox="0 0 24 24"><path d="M4 20h16M7 16v-5M12 16V7M17 16v-8"/></symbol>
  <symbol id="i-refresh" viewBox="0 0 24 24"><path d="M20 11.5a8 8 0 1 0-.8 4.5"/><path d="M20 5v6h-6"/></symbol>
  <symbol id="i-external" viewBox="0 0 24 24"><path d="M14 5h5v5M19 5l-8 8"/><path d="M18 14v4.5c0 .8-.7 1.5-1.5 1.5h-11C4.7 20 4 19.3 4 18.5v-11C4 6.7 4.7 6 5.5 6H10"/></symbol>
  <symbol id="i-lock" viewBox="0 0 24 24"><rect x="5" y="10.5" width="14" height="9" rx="2"/><path d="M8 10.5V8a4 4 0 0 1 8 0v2.5"/></symbol>
</defs></svg>

<aside>
  <div class="sb-h">
    <h1><span class="bi"><svg class="icn"><use href="#i-news"/></svg></span>AI 日报聚合台</h1>
    <div class="sub">十源合一 · 切换/刷新均强制拉最新<br>
      <span class="k"><span class="d" style="background:var(--green)"></span>固定域名</span>
      <span class="k"><span class="d" style="background:#B0B0B8"></span>仅本机可看</span>
    </div>
  </div>
  <nav id="nav"></nav>
</aside>
<main>
  <div class="toolbar">
    <span id="curName"></span>
    <button class="act" id="btnRefresh"><svg class="icn"><use href="#i-refresh"/></svg>刷新</button>
    <a class="act" id="btnOpen" target="_blank" rel="noopener"><svg class="icn"><use href="#i-external"/></svg>新标签打开</a>
    <span class="url" id="curUrl"></span>
    <span class="spacer"></span>
  </div>
  <div class="frameWrap">
    <div class="card">
      <iframe id="frame" title="report"></iframe>
      <div id="hintbox"></div>
    </div>
  </div>
</main>

<script>
if(new URLSearchParams(location.search).get('embed')==='1') document.body.classList.add('embed');
/* ============================================================
   源配置：group=左栏主题分组（组内按重要度排）；kind:
     stable = 固定域名（同事可看）
     local  = 本机文件路径（外部机器/公网打开时给提示不加载）
   加新源：往 SOURCES 里加一行即可，左栏自动归组。
   ============================================================ */
const SOURCES = [
  { id:'inf', group:'AI · 科技',  name:'AI通胀产业链日报', url:'https://ai-inflation-daily.pages.dev/', kind:'stable' },
  { id:'mat', group:'AI · 科技',  name:'AI新材料·每日复盘', url:'https://reports.ty-workplace.com/public/ai-materials-daily-report/', kind:'stable' },
  { id:'cns', group:'消费',       name:'消费PM每日简报',   url:'https://zhouboshi1998-droid.github.io/consumer-pm-brief/', kind:'stable' },
  { id:'ovs', group:'消费',       name:'消费出海周报',     url:'https://nf-llm-station.pages.dev/chuhai.html', kind:'stable' },
  { id:'med', group:'其他行业',   name:'医药每日简报',     url:'https://yiyao-daily.pages.dev/', kind:'stable' },
  { id:'che', group:'其他行业',   name:'化工日报',         url:'https://zybzzh.github.io/zyzheng/', kind:'stable' },
  { id:'nfm', group:'其他行业',   name:'有色金属日报',     url:'https://reports.ty-workplace.com/public/nonferrous-metals-daily-report/', kind:'stable' },
  // 金融产业链日报：URL 必须带 master. 前缀（Cloudflare Pages 分支别名）——裸域 financial-daily-report.pages.dev 实测 404
  { id:'fin', group:'其他行业',   name:'金融产业链日报',   url:'https://master.financial-daily-report.pages.dev/', kind:'stable' },
  { id:'em',  group:'策略 · 组合', name:'南方远航·EM日报',  url:'https://jerryfanfanfanfan.github.io/nanfang-yuanhang-em-daily/', kind:'stable' },
  { id:'dvd', group:'策略 · 组合', name:'红利日报',         url:'https://dvdstock-daily.pages.dev/', kind:'stable', note:'需登录，密码：dvddlnf（用户名随便填）' },
  { id:'gls', group:'策略 · 组合', name:'券商月度金股',     url:'https://yufei-wang.github.io/gold-stock/', kind:'stable' },
];
const GROUP_ICON = { 'AI · 科技':'i-cube', '消费':'i-cart', '其他行业':'i-building', '策略 · 组合':'i-chart' };

const frame = document.getElementById('frame');
const hintbox = document.getElementById('hintbox');
const curUrl = document.getElementById('curUrl');
const curName = document.getElementById('curName');
const btnOpen = document.getElementById('btnOpen');
let current = SOURCES[0];
const onFileProto = location.protocol === 'file:';

function bust(u){ const sep = u.includes('?') ? '&' : '?'; return u + sep + '_ts=' + Date.now(); }

function load(src){
  current = src;
  [...document.querySelectorAll('.item')].forEach(t=>t.classList.toggle('active', t.dataset.id===src.id));
  curName.textContent = src.name;
  curUrl.textContent = src.kind==='local' ? '(本机文件)' : src.url;
  btnOpen.href = src.url;
  if(src.kind==='local' && !onFileProto){
    frame.src = 'about:blank';
    hintbox.innerHTML = '📁 该日报是本机文件，仅在周浩电脑本地打开时可见。<br>同事如需查看，请等该源迁移到固定域名。';
    hintbox.classList.add('show');
    return;
  }
  hintbox.classList.remove('show');
  frame.src = bust(src.url);
}

frame.addEventListener('load', ()=>{ if(current.kind!=='local'||onFileProto) hintbox.classList.remove('show'); });
document.getElementById('btnRefresh').onclick = ()=>load(current);

function buildNav(){
  const box = document.getElementById('nav');
  box.innerHTML = '';
  let lastGroup = null;
  SOURCES.forEach(s=>{
    if(s.group !== lastGroup){
      const g = document.createElement('div');
      g.className = 'grp';
      g.innerHTML = `<svg class="icn gi"><use href="#${GROUP_ICON[s.group]||'i-cube'}"/></svg>${s.group}`;
      box.appendChild(g);
      lastGroup = s.group;
    }
    const b = document.createElement('div');
    b.className = 'item'; b.dataset.id = s.id;
    b.innerHTML = `<span class="dot ${s.kind}"></span>${s.name}` +
      (s.kind==='local' ? '<small>仅本机</small>'
        : (s.note ? `<small class="note"><svg class="icn"><use href="#i-lock"/></svg>${s.note}</small>` : ''));
    b.onclick = ()=>load(s);
    box.appendChild(b);
  });
}

buildNav();
load(SOURCES[0]);
</script>
</body>
</html>
