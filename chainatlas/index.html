const STREAM_KEYS = ["upstream","midstream","downstream"];
let totSec=0, totCo=0, liveSec=0, activeEl=null;
const $ = id => document.getElementById(id);
const tree = $('tree');

// ── 视图切换 ──
function showFrame(){ $('home').classList.add('hidden'); $('frame').classList.remove('hidden'); }
function showHome(){
  $('frame').classList.add('hidden'); $('frame').src='about:blank';
  $('home').classList.remove('hidden');
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
  $('cur').classList.add('hidden'); $('curbdg').classList.add('hidden'); $('newtab').classList.add('hidden');
}
function openHub(sd,name){
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
  showFrame(); $('frame').src=sd.live;
  const c=$('cur'); c.textContent=name+' · 板块全量'; c.classList.remove('hidden');
  const b=$('curbdg'); b.textContent='LIVE'; b.style.background='var(--live)'; b.classList.remove('hidden');
  const nt=$('newtab'); nt.href=sd.live; nt.classList.remove('hidden');
}
function openCo(el,c,sname,sd){
  if(activeEl)activeEl.classList.remove('active');
  activeEl=el; el.classList.add('active');
  showFrame(); $('frame').src=c.href;
  const cur=$('cur'); cur.textContent=`${sname} · ${c.name}${c.code?' ('+c.code+')':''}`; cur.classList.remove('hidden');
  const b=$('curbdg');
  b.textContent=sd.live?'LIVE':'本地'; b.style.background=sd.live?'var(--live)':'var(--localc)'; b.classList.remove('hidden');
  const nt=$('newtab'); nt.href=c.href; nt.classList.remove('hidden');
}

// ── 左树 ──
STREAM_KEYS.forEach(sk=>{
  const st = DATA[sk]; if(!st) return;
  const box=document.createElement('div'); box.className='stream';
  const sh=document.createElement('div'); sh.className='sh'; sh.style.color=st.color;
  sh.innerHTML=`<span class="sd" style="background:${st.color}"></span>${st.title}`; box.appendChild(sh);
  Object.entries(st.sectors).forEach(([sname,sd])=>{
    totSec++; totCo+=sd.companies.length; if(sd.live) liveSec++;
    const isLive=!!sd.live;
    const sec=document.createElement('div'); sec.className='sector';
    const h=document.createElement('div'); h.className='sec-h';
    h.innerHTML=`<span class="caret">▶</span><span class="dot" style="background:${st.color}"></span>`+
      `<span class="nm">${sname}</span>`+
      `<span class="bdg ${isLive?'live':'local'}">${isLive?'LIVE':'本地'}</span>`+
      `<span class="cnt">${sd.companies.length}</span>`;
    const cl=document.createElement('div'); cl.className='clist';
    if(isLive){
      const s=document.createElement('div'); s.className='src';
      s.innerHTML=`源 · <a href="${sd.srcurl||sd.live}" target="_blank" rel="noopener">${sd.src} ↗</a>`;
      cl.appendChild(s);
    }
    sd.companies.forEach(c=>{
      const a=document.createElement('div'); a.className='citem';
      a.dataset.key=(c.name+' '+(c.code||'')).toLowerCase();
      a.innerHTML=`${c.name}${c.code?`<span class="code">${c.code}</span>`:''}`;
      a.onclick=(e)=>{e.stopPropagation();openCo(a,c,sname,sd);};
      cl.appendChild(a);
    });
    h.onclick=()=>{
      const willOpen=!h.classList.contains('open');
      h.classList.toggle('open');cl.classList.toggle('open');
      if(willOpen && isLive) openHub(sd,sname);
    };
    sec.appendChild(h); sec.appendChild(cl); box.appendChild(sec);
  });
  tree.appendChild(box);
});
$('statLive').textContent=liveSec+' 板块 LIVE';
$('statSec').textContent=totSec+' 子行业';
$('statCo').textContent=totCo+' 家公司';

// ── 更新看板 首页 ──
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function relLabel(d,today){
  if(!d) return '监测中';
  const n=daysBetween(d,today);
  if(n<=0) return '今天'; if(n===1) return '昨天'; if(n<=30) return n+' 天前';
  if(n<=60) return '约 1 个月前'; return Math.round(n/30)+' 个月前';
}
function freshClass(d,today){
  if(!d) return 'mon';
  const n=daysBetween(d,today);
  return n<=7?'i-g':(n<=30?'i-o':'i-w');
}
function renderHome(){
  const home=$('home'); const today=(STATUS&&STATUS.today)||'';
  const sites=(STATUS&&STATUS.sites)||[];
  const dated=sites.filter(s=>s.refreshed), mon=sites.filter(s=>!s.refreshed);
  const gen=(STATUS&&STATUS.generated_at||'').replace('T',' ').slice(0,16);
  const newest=dated.length?dated[0].refreshed:'—';
  const card=s=>{
    const fc=freshClass(s.refreshed,today);
    const dotcls=s.refreshed?('fdot '+({'i-g':'',_:''}[fc]||'')):'fdot mon';
    const dotstyle=s.refreshed?`background:${fc==='i-g'?'var(--green)':fc==='i-o'?'var(--orange)':'var(--label3)'}`:'';
    const chips=s.sectors.map(x=>`<span class="chip">${x}</span>`).join('');
    const chgd=s.changed_since_stated&&s.last_change?`<div class="chgd">◆ 检测到新变化 ${s.last_change}（站内日期未同步）</div>`:'';
    const dateHtml=s.refreshed?`<span class="date">${s.refreshed}</span><span class="rel">${relLabel(s.refreshed,today)}</span>`
                              :`<span class="date" style="color:var(--teal)">监测中</span><span class="rel">站内无日期戳 · 靠内容哈希盯变化</span>`;
    return `<a class="scard" href="${s.url}" onclick="return boardOpen(event,'${s.url}','${(s.sectors[0]||'').replace(/'/g,'')}')">
      <span class="${dotcls}" style="${dotstyle}"></span>
      <div class="body">
        <div class="r1">${dateHtml}<span class="live">LIVE</span></div>
        <div class="secs">${chips}</div>
        <div class="dom">${s.domain} <span class="arrow">↗</span></div>
        ${chgd}
      </div></a>`;
  };
  home.innerHTML=`
    <div class="home-hero">
      <div class="eye">更新看板 · Update Board</div>
      <h2>谁最近刷新了数据与结论</h2>
      <p>下面每个 live 站都是同事各自维护、自动更新的。这里只做统一展示：按各站<b>自己声明的"数据截至"日期</b>排序，配合<b>内容哈希</b>盯变化——同事一推站，这里第二天就自动往前排。</p>
      <div class="home-meta">
        <span>${sites.length} 个 live 站 · 最新 ${newest}</span>
        <span class="legend">
          <span><i class="i-g"></i>7 天内</span><span><i class="i-o"></i>30 天内</span>
          <span><i class="i-w"></i>更早</span><span><i class="i-m"></i>监测中</span>
        </span>
      </div>
    </div>
    <div class="board">
      ${dated.map(card).join('')}
      ${mon.length?`<div class="grouplbl">◷ 监测中（站内暂无日期戳，靠内容哈希盯变化）</div>`+mon.map(card).join(''):''}
    </div>
    <div class="foot-note">
      <b>检测口径</b>：站内日期戳（"数据截至/更新 YYYY-MM-DD"，12/14 站自带）优先展示；无日期戳的站靠内容哈希（sha1(index)）跨天比对，一变即标"检测到刷新"。<b>不含"谁刷新"</b>——托管平台不公开部署人，按周浩指令只按站/板块+日期排。检测于 ${gen}（北京）· 每日随 run_daily 顺跑，零 token。
    </div>`;
}
function boardOpen(e,url,name){ e.preventDefault(); openHub({live:url},name||'板块'); return false; }
renderHome();

// ── 搜索 ──
const q=$('q');
q.addEventListener('input',()=>{
  const v=q.value.trim().toLowerCase();
  document.querySelectorAll('.sector').forEach(sec=>{
    let any=false;
    sec.querySelectorAll('.citem').forEach(it=>{
      const hit=!v||it.dataset.key.includes(v);
      it.style.display=hit?'flex':'none'; if(hit)any=true;
    });
    sec.style.display=any?'block':'none';
    if(v){sec.querySelector('.sec-h').classList.add('open');sec.querySelector('.clist').classList.add('open');}
  });
});
q.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const first=[...document.querySelectorAll('.citem')].find(it=>it.style.display!=='none');if(first)first.click();}
});
</script>
