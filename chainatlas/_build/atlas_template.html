<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI通胀链一页纸图谱 · LIVE 接入 · 南方基金</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --accent:#007AFF;--green:#34C759;--orange:#FF9500;--red:#FF3B30;--purple:#AF52DE;--teal:#30B0C7;
  --label:#1C1C1E;--label2:#636366;--label3:#8E8E93;
  --sep:rgba(60,60,67,.16);--sep2:rgba(60,60,67,.09);--hair:rgba(255,255,255,.72);
  --bg:#F2F2F7;--paper:#FFFFFF;--panel:rgba(255,255,255,.92);
  --sb:rgba(246,247,251,.94);--fill:rgba(118,118,128,.12);--fill2:rgba(118,118,128,.08);
  --hover:rgba(118,118,128,.10);--active:rgba(0,122,255,.13);
  --live:#1E9E4A;--livebg:rgba(52,199,89,.14);--localc:#8E8E93;--localbg:rgba(118,118,128,.12);
  --shadow:0 18px 46px rgba(25,45,75,.10),0 2px 12px rgba(25,45,75,.06);
  --shadow-soft:0 8px 24px rgba(25,45,75,.07),0 1px 3px rgba(25,45,75,.05);
  --ease:cubic-bezier(.32,.72,0,1);
  --sans:-apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
}
html{background:#DCE9F8}
html,body{height:100%}
body{font-family:var(--sans);color:var(--label);display:flex;flex-direction:column;height:100vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;
  background:radial-gradient(900px 480px at 6% -6%,rgba(76,177,255,.12),transparent),
             radial-gradient(820px 520px at 98% 2%,rgba(175,82,222,.07),transparent),var(--bg);}
.top{background:var(--panel);border-bottom:.5px solid var(--sep);padding:11px 20px;
  display:flex;align-items:center;gap:12px;flex:0 0 auto;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.top .kick{font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:var(--accent);font-weight:650}
.top h1{font-size:17px;font-weight:720;letter-spacing:-.02em}
.top .sub{font-size:12px;color:var(--label3)}
.top .spacer{flex:1}
.top .stat{font-size:11px;color:var(--label2);background:var(--fill);padding:3px 10px;border-radius:999px;font-variant-numeric:tabular-nums}
.top .stat.lv{color:var(--live);background:var(--livebg)}
.wrap{flex:1;display:flex;min-height:0}
.side{width:344px;flex:0 0 auto;background:var(--sb);border-right:.5px solid var(--sep);
  display:flex;flex-direction:column;min-height:0;-webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.search{padding:12px 12px 8px;position:relative}
.search input{width:100%;padding:9px 13px;border:.5px solid var(--sep);border-radius:12px;background:var(--paper);
  font-size:13px;font-family:var(--sans);color:var(--label);outline:none;transition:border-color .16s ease,box-shadow .16s ease}
.search input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,122,255,.12)}
.tree{flex:1;overflow-y:auto;padding:2px 8px 34px;scrollbar-width:thin}
.stream>.sh{font-size:10.5px;font-weight:700;letter-spacing:.07em;padding:15px 12px 5px;
  color:var(--label3);display:flex;align-items:center;gap:7px}
.stream>.sh .sd{width:7px;height:7px;border-radius:2px;flex:0 0 auto}
.sector{margin:1px 0}
.sec-h{display:flex;align-items:center;gap:8px;min-height:36px;padding:7px 10px;border-radius:11px;cursor:pointer;
  font-size:13px;font-weight:560;color:var(--label);user-select:none;transition:background .16s ease}
.sec-h:hover{background:var(--hover)}
.sec-h.open{background:var(--fill2)}
.sec-h .caret{font-size:9px;color:var(--label3);transition:transform .18s var(--ease);width:9px;flex:0 0 auto}
.sec-h.open .caret{transform:rotate(90deg)}
.sec-h .dot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;box-shadow:inset 0 0 0 .5px rgba(0,0,0,.08)}
.sec-h .nm{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sec-h .cnt{margin-left:auto;font-size:10.5px;color:var(--label3);background:var(--fill);border-radius:999px;
  min-width:22px;text-align:center;padding:1px 7px;flex:0 0 auto;font-variant-numeric:tabular-nums}
.bdg{font-size:8.5px;font-weight:800;letter-spacing:.04em;padding:2px 6px;border-radius:999px;flex:0 0 auto}
.bdg.live{color:var(--live);background:var(--livebg)}
.bdg.local{color:var(--localc);background:var(--localbg)}
.clist{display:none;padding:2px 0 8px 26px}
.clist.open{display:block}
.src{font-size:10px;color:var(--label3);padding:2px 10px 6px;display:flex;align-items:center;gap:5px}
.src a{color:var(--accent);text-decoration:none}
.src a:hover{text-decoration:underline}
.citem{display:flex;align-items:center;min-height:30px;padding:5px 11px;font-size:12.5px;color:var(--label2);border-radius:9px;cursor:pointer;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .14s ease,color .14s ease}
.citem:hover{background:var(--hover);color:var(--label)}
.citem.active{background:var(--active);color:var(--accent);font-weight:640}
.citem .code{font-size:9.5px;color:var(--label3);margin-left:6px;font-variant-numeric:tabular-nums}
.citem.active .code{color:var(--accent)}
.main{flex:1;min-width:0;position:relative;display:flex;flex-direction:column}
.bar{flex:0 0 auto;min-height:50px;background:var(--panel);border-bottom:.5px solid var(--sep);
  display:flex;align-items:center;gap:10px;padding:0 16px;font-size:13px;color:var(--label2);
  -webkit-backdrop-filter:blur(20px);backdrop-filter:blur(20px)}
.homebtn{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-weight:560;color:var(--accent);
  cursor:pointer;border:.5px solid var(--sep);border-radius:999px;padding:5px 12px;background:var(--paper);
  transition:background .14s ease,transform .1s ease;flex:0 0 auto}
.homebtn:hover{background:var(--fill2)} .homebtn:active{transform:scale(.97)}
.bar #cur{font-weight:640;color:var(--label);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar .barbdg{font-size:9.5px;font-weight:800;padding:2px 8px;border-radius:999px;color:#fff;flex:0 0 auto}
.bar a.newtab{margin-left:auto;font-size:11.5px;font-weight:560;color:var(--accent);text-decoration:none;
  border:.5px solid var(--sep);border-radius:999px;padding:5px 12px;flex:0 0 auto;background:var(--paper);transition:background .14s ease}
.bar a.newtab:hover{background:var(--fill2)}
.stage{flex:1;position:relative;min-height:0}
iframe{position:absolute;inset:0;width:100%;height:100%;border:none;background:var(--bg)}

/* ── 更新看板 首页 ── */
.home{position:absolute;inset:0;overflow-y:auto;padding:26px clamp(16px,4vw,40px) 60px;background:transparent}
.home-hero{max-width:940px;margin:0 auto 20px}
.home-hero .eye{font-size:11px;font-weight:650;letter-spacing:.07em;color:var(--accent);text-transform:uppercase}
.home-hero h2{font-size:24px;font-weight:770;letter-spacing:-.025em;margin:6px 0 7px}
.home-hero p{font-size:13.5px;color:var(--label2);line-height:1.65;max-width:720px}
.home-meta{display:flex;flex-wrap:wrap;gap:8px 16px;margin-top:13px;align-items:center;font-size:11.5px;color:var(--label3)}
.legend{display:flex;flex-wrap:wrap;gap:12px}
.legend span{display:inline-flex;align-items:center;gap:5px}
.legend i{width:9px;height:9px;border-radius:50%;display:inline-block}
.i-g{background:var(--green)}.i-o{background:var(--orange)}.i-w{background:var(--label3)}
.i-m{background:transparent;box-shadow:inset 0 0 0 1.5px var(--teal)}
.board{max-width:940px;margin:0 auto;display:grid;grid-template-columns:1fr 1fr;gap:12px}
@media(max-width:820px){.board{grid-template-columns:1fr}}
.grouplbl{grid-column:1/-1;font-size:11px;font-weight:700;letter-spacing:.06em;color:var(--label3);margin:8px 2px 0}
.scard{display:flex;align-items:flex-start;gap:13px;background:var(--paper);border:.5px solid var(--sep);
  border-radius:17px;box-shadow:var(--shadow-soft);padding:15px 17px;cursor:pointer;text-decoration:none;color:inherit;
  transition:transform .24s var(--ease),box-shadow .24s var(--ease)}
.scard:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.scard .fdot{width:11px;height:11px;border-radius:50%;flex:0 0 auto;margin-top:4px}
.scard .fdot.mon{background:transparent;box-shadow:inset 0 0 0 2px var(--teal)}
.scard .body{flex:1;min-width:0}
.scard .r1{display:flex;align-items:baseline;gap:9px;flex-wrap:wrap}
.scard .date{font-size:16px;font-weight:760;letter-spacing:-.02em;font-variant-numeric:tabular-nums}
.scard .rel{font-size:11.5px;color:var(--label3)}
.scard .live{margin-left:auto;font-size:8.5px;font-weight:800;color:var(--live);background:var(--livebg);border-radius:999px;padding:2px 7px}
.scard .secs{display:flex;flex-wrap:wrap;gap:5px;margin:8px 0 7px}
.scard .chip{font-size:11px;font-weight:600;color:var(--label);background:var(--fill);border-radius:999px;padding:3px 9px}
.scard .dom{font-size:10.5px;color:var(--label3);display:flex;align-items:center;gap:5px}
.scard .dom .arrow{color:var(--accent);font-weight:700}
.scard .chgd{font-size:10.5px;color:var(--accent);margin-top:5px;display:flex;align-items:center;gap:4px}
.foot-note{max-width:940px;margin:22px auto 0;font-size:11px;color:var(--label3);line-height:1.7;
  border-top:.5px solid var(--sep2);padding-top:13px}
.foot-note b{color:var(--label2);font-weight:600}
.hidden{display:none!important}
body.embed .top{display:none}
</style>
</head>
<body>
<div class="top">
  <span class="kick">南方基金 · AI 通胀链</span>
  <h1>AI通胀链一页纸图谱</h1>
  <span class="sub">个股扫描一页纸 · LIVE 接入</span>
  <span class="spacer"></span>
  <span class="stat lv" id="statLive"></span>
  <span class="stat" id="statSec"></span>
  <span class="stat" id="statCo"></span>
</div>
<div class="wrap">
  <div class="side">
    <div class="search"><input id="q" placeholder="搜公司名 / 代码，回车打开第一个"></div>
    <div class="tree" id="tree"></div>
  </div>
  <div class="main">
    <div class="bar">
      <span class="homebtn" id="homebtn" onclick="showHome()">⌂ 更新看板</span>
      <span id="cur" class="hidden">未选择</span><span class="barbdg hidden" id="curbdg"></span>
      <a class="newtab hidden" id="newtab" target="_blank">↗ 新标签打开</a>
    </div>
    <div class="stage">
      <iframe id="frame" name="frame" class="hidden"></iframe>
      <div class="home" id="home"></div>
    </div>
  </div>
</div>
<script>
if(new URLSearchParams(location.search).get('embed')==='1') document.body.classList.add('embed');
const DATA = __DATA__;
const STATUS = __STATUS__;
const STREAM_KEYS = ["upstream","midstream","downstream"];
let totSec=0, totCo=0, liveSec=0, activeEl=null;
const $ = id => document.getElementById(id);
const tree = $('tree');

// ── 视图切换 ──
function showFrame(){ $('home').classList.add('hidden'); $('frame').classList.remove('hidden'); }
function showHome(){
  $('frame').classList.add('hidden'); $('frame').src='about:blank';
  $('home').classList.remove('hidden');
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
  $('cur').classList.add('hidden'); $('curbdg').classList.add('hidden'); $('newtab').classList.add('hidden');
}
function openHub(sd,name){
  if(activeEl){activeEl.classList.remove('active');activeEl=null;}
  showFrame(); $('frame').src=sd.live;
  const c=$('cur'); c.textContent=name+' · 板块全量'; c.classList.remove('hidden');
  const b=$('curbdg'); b.textContent='LIVE'; b.style.background='var(--live)'; b.classList.remove('hidden');
  const nt=$('newtab'); nt.href=sd.live; nt.classList.remove('hidden');
}
function openCo(el,c,sname,sd){
  if(activeEl)activeEl.classList.remove('active');
  activeEl=el; el.classList.add('active');
  showFrame(); $('frame').src=c.href;
  const cur=$('cur'); cur.textContent=`${sname} · ${c.name}${c.code?' ('+c.code+')':''}`; cur.classList.remove('hidden');
  const b=$('curbdg');
  b.textContent=sd.live?'LIVE':'本地'; b.style.background=sd.live?'var(--live)':'var(--localc)'; b.classList.remove('hidden');
  const nt=$('newtab'); nt.href=c.href; nt.classList.remove('hidden');
}

// ── 左树 ──
STREAM_KEYS.forEach(sk=>{
  const st = DATA[sk]; if(!st) return;
  const box=document.createElement('div'); box.className='stream';
  const sh=document.createElement('div'); sh.className='sh'; sh.style.color=st.color;
  sh.innerHTML=`<span class="sd" style="background:${st.color}"></span>${st.title}`; box.appendChild(sh);
  Object.entries(st.sectors).forEach(([sname,sd])=>{
    totSec++; totCo+=sd.companies.length; if(sd.live) liveSec++;
    const isLive=!!sd.live;
    const sec=document.createElement('div'); sec.className='sector';
    const h=document.createElement('div'); h.className='sec-h';
    h.innerHTML=`<span class="caret">▶</span><span class="dot" style="background:${st.color}"></span>`+
      `<span class="nm">${sname}</span>`+
      `<span class="bdg ${isLive?'live':'local'}">${isLive?'LIVE':'本地'}</span>`+
      `<span class="cnt">${sd.companies.length}</span>`;
    const cl=document.createElement('div'); cl.className='clist';
    if(isLive){
      const s=document.createElement('div'); s.className='src';
      s.innerHTML=`源 · <a href="${sd.srcurl||sd.live}" target="_blank" rel="noopener">${sd.src} ↗</a>`;
      cl.appendChild(s);
    }
    sd.companies.forEach(c=>{
      const a=document.createElement('div'); a.className='citem';
      a.dataset.key=(c.name+' '+(c.code||'')).toLowerCase();
      a.innerHTML=`${c.name}${c.code?`<span class="code">${c.code}</span>`:''}`;
      a.onclick=(e)=>{e.stopPropagation();openCo(a,c,sname,sd);};
      cl.appendChild(a);
    });
    h.onclick=()=>{
      const willOpen=!h.classList.contains('open');
      h.classList.toggle('open');cl.classList.toggle('open');
      if(willOpen && isLive) openHub(sd,sname);
    };
    sec.appendChild(h); sec.appendChild(cl); box.appendChild(sec);
  });
  tree.appendChild(box);
});
$('statLive').textContent=liveSec+' 板块 LIVE';
$('statSec').textContent=totSec+' 子行业';
$('statCo').textContent=totCo+' 家公司';

// ── 更新看板 首页 ──
function daysBetween(a,b){ return Math.round((new Date(b)-new Date(a))/864e5); }
function relLabel(d,today){
  if(!d) return '监测中';
  const n=daysBetween(d,today);
  if(n<=0) return '今天'; if(n===1) return '昨天'; if(n<=30) return n+' 天前';
  if(n<=60) return '约 1 个月前'; return Math.round(n/30)+' 个月前';
}
function freshClass(d,today){
  if(!d) return 'mon';
  const n=daysBetween(d,today);
  return n<=7?'i-g':(n<=30?'i-o':'i-w');
}
function renderHome(){
  const home=$('home'); const today=(STATUS&&STATUS.today)||'';
  const sites=(STATUS&&STATUS.sites)||[];
  const dated=sites.filter(s=>s.refreshed), mon=sites.filter(s=>!s.refreshed);
  const gen=(STATUS&&STATUS.generated_at||'').replace('T',' ').slice(0,16);
  const newest=dated.length?dated[0].refreshed:'—';
  const card=s=>{
    const fc=freshClass(s.refreshed,today);
    const dotcls=s.refreshed?('fdot '+({'i-g':'',_:''}[fc]||'')):'fdot mon';
    const dotstyle=s.refreshed?`background:${fc==='i-g'?'var(--green)':fc==='i-o'?'var(--orange)':'var(--label3)'}`:'';
    const chips=s.sectors.map(x=>`<span class="chip">${x}</span>`).join('');
    const chgd=s.changed_since_stated&&s.last_change?`<div class="chgd">◆ 检测到新变化 ${s.last_change}（站内日期未同步）</div>`:'';
    const dateHtml=s.refreshed?`<span class="date">${s.refreshed}</span><span class="rel">${relLabel(s.refreshed,today)}</span>`
                              :`<span class="date" style="color:var(--teal)">监测中</span><span class="rel">站内无日期戳 · 靠内容哈希盯变化</span>`;
    return `<a class="scard" href="${s.url}" onclick="return boardOpen(event,'${s.url}','${(s.sectors[0]||'').replace(/'/g,'')}')">
      <span class="${dotcls}" style="${dotstyle}"></span>
      <div class="body">
        <div class="r1">${dateHtml}<span class="live">LIVE</span></div>
        <div class="secs">${chips}</div>
        <div class="dom">${s.domain} <span class="arrow">↗</span></div>
        ${chgd}
      </div></a>`;
  };
  home.innerHTML=`
    <div class="home-hero">
      <div class="eye">更新看板 · Update Board</div>
      <h2>谁最近刷新了数据与结论</h2>
      <p>下面每个 live 站都是同事各自维护、自动更新的。这里只做统一展示：按各站<b>自己声明的"数据截至"日期</b>排序，配合<b>内容哈希</b>盯变化——同事一推站，这里第二天就自动往前排。</p>
      <div class="home-meta">
        <span>${sites.length} 个 live 站 · 最新 ${newest}</span>
        <span class="legend">
          <span><i class="i-g"></i>7 天内</span><span><i class="i-o"></i>30 天内</span>
          <span><i class="i-w"></i>更早</span><span><i class="i-m"></i>监测中</span>
        </span>
      </div>
    </div>
    <div class="board">
      ${dated.map(card).join('')}
      ${mon.length?`<div class="grouplbl">◷ 监测中（站内暂无日期戳，靠内容哈希盯变化）</div>`+mon.map(card).join(''):''}
    </div>
    <div class="foot-note">
      <b>检测口径</b>：站内日期戳（"数据截至/更新 YYYY-MM-DD"，12/14 站自带）优先展示；无日期戳的站靠内容哈希（sha1(index)）跨天比对，一变即标"检测到刷新"。<b>不含"谁刷新"</b>——托管平台不公开部署人，按周浩指令只按站/板块+日期排。检测于 ${gen}（北京）· 每日随 run_daily 顺跑，零 token。
    </div>`;
}
function boardOpen(e,url,name){ e.preventDefault(); openHub({live:url},name||'板块'); return false; }
renderHome();

// ── 搜索 ──
const q=$('q');
q.addEventListener('input',()=>{
  const v=q.value.trim().toLowerCase();
  document.querySelectorAll('.sector').forEach(sec=>{
    let any=false;
    sec.querySelectorAll('.citem').forEach(it=>{
      const hit=!v||it.dataset.key.includes(v);
      it.style.display=hit?'flex':'none'; if(hit)any=true;
    });
    sec.style.display=any?'block':'none';
    if(v){sec.querySelector('.sec-h').classList.add('open');sec.querySelector('.clist').classList.add('open');}
  });
});
q.addEventListener('keydown',e=>{
  if(e.key==='Enter'){const first=[...document.querySelectorAll('.citem')].find(it=>it.style.display!=='none');if(first)first.click();}
});
</script>
</body>
</html>
